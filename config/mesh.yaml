# Mesh 3-agent sweep config
# 1:1 with scripts/run_mesh.py

run:
  n_runs: 20
  run_id_prefix: "mesh"

llm:
  model: "Qwen/Qwen2.5-32B-Instruct"
  base_url: "${OPENAI_BASE_URL}"
  api_key: "${OPENAI_API_KEY}"
  temperature: 0.0
  max_tokens: 1500
  request_timeout: 120

workspace:
  workspace_root: "workspace/"

artifacts:
  output_dir: "artifacts/"
