[defaults]
inventory         = inventory.sh
remote_user       = ubuntu
private_key_file  = ../ssh/aip-intern-generated-key.pem
host_key_checking = False
stdout_callback   = default
result_format     = yaml

[ssh_connection]
# Keep SSH alive across long-running tasks (vLLM load, sweep loops, health retries)
# 30s × 240 = 7200s = 2h keepalive window
ssh_args = -o ServerAliveInterval=30 -o ServerAliveCountMax=240 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -C -o ControlMaster=auto -o ControlPersist=300s
