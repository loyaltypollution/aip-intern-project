---
# Usage: ansible-playbook run_sweep.yml -e "scenario=S1 sweep_type=baseline"
#        ansible-playbook run_sweep.yml -e "scenario=S1 sweep_type=mesh"
# Optional: -e "skip_aiperf=true" -e "skip_nemo_eval=true"
# sweep_type: "baseline" runs scripts/run_baseline.py
#             "mesh"     runs scripts/run_mesh.py

- name: Start vLLM for {{ scenario }}
  hosts: gpu
  become: true
  any_errors_fatal: true
  tasks:
    - name: Validate scenario
      assert:
        that: scenario in scenarios
        fail_msg: "Invalid scenario '{{ scenario }}'. Must be one of: {{ scenarios.keys() | list | join(', ') }}"

    - name: Deploy vLLM systemd unit for {{ scenario }}
      ansible.builtin.template:
        src: ../templates/vllm.service.j2
        dest: /etc/systemd/system/vllm.service
        mode: '0644'

    - name: Reload systemd daemon
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Restart vLLM service
      ansible.builtin.systemd_service:
        name: vllm
        state: restarted
        enabled: false

    - name: Wait for vLLM to be ready on port 8000 (async shell poll)
      shell: |
        # Model load for 32B on 4xL40S is ~60–180s. Cap poll at 15 min and
        # fail fast if systemd reports the unit failed/inactive — otherwise
        # a crashed vllm looks identical to a slow-loading vllm for 1h.
        for i in $(seq 1 90); do
          if curl -sf --max-time 5 http://127.0.0.1:8000/v1/models > /dev/null 2>&1; then
            echo "vLLM ready after $((i * 10))s"
            exit 0
          fi
          STATE=$(systemctl is-active vllm || true)
          if [ "$STATE" = "failed" ] || [ "$STATE" = "inactive" ]; then
            echo "FATAL: vllm.service state=$STATE after $((i * 10))s — not waiting further"
            journalctl -u vllm --no-pager -n 80
            exit 1
          fi
          echo "Attempt $i/90 — state=$STATE — waiting 10s..."
          sleep 10
        done
        echo "TIMEOUT: vLLM not ready after 900s"
        journalctl -u vllm --no-pager -n 80
        exit 1
      args:
        executable: /bin/bash
      async: 1000
      poll: 20

- name: Benchmark {{ scenario }}
  hosts: cpu
  tasks:
    - name: Wait for vLLM health + inference probe (async shell poll)
      shell: |
        set -euo pipefail
        GPU="{{ gpu_private_ip }}"
        MODEL="{{ scenarios[scenario].model }}"

        echo "=== Waiting for /v1/models ==="
        for i in $(seq 1 360); do
          STATUS=$(curl -sf --max-time 5 "http://${GPU}:8000/v1/models" 2>&1) && {
            echo "vLLM /v1/models OK: $STATUS"
            break
          }
          echo "Attempt $i/360 — retrying in 10s..."
          sleep 10
        done

        echo "=== Inference probe (hi / max_tokens=1) ==="
        for i in $(seq 1 120); do
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            -X POST "http://${GPU}:8000/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"${MODEL}\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}],\"max_tokens\":1}")
          if [ "$CODE" = "200" ]; then
            echo "Inference probe OK (attempt $i)"
            exit 0
          fi
          echo "Probe attempt $i/120 — HTTP $CODE — retrying in 30s..."
          sleep 30
        done
        echo "ERROR: inference probe timed out"
        exit 1
      args:
        executable: /bin/bash
      async: 7200
      poll: 30

    - name: "Run AIPerf (concurrency {{ item }})"
      shell: |
        source ~/aiperf/.venv/bin/activate
        aiperf profile \
          --model '{{ scenarios[scenario].model }}' \
          --url http://{{ gpu_private_ip }}:8000 \
          --prompt-input-tokens-mean 512 \
          --prompt-input-tokens-stddev 0 \
          --prompt-output-tokens-mean 512 \
          --prompt-output-tokens-stddev 0 \
          --endpoint-type chat \
          --streaming \
          --concurrency {{ item }} \
          --request-count 200 \
          --artifact-dir ~/artifacts/aip-intern/{{ scenario }}/con{{ item }}
      args:
        executable: /bin/bash
      loop: "{{ aiperf_concurrency_levels }}"
      async: "{{ aiperf_timeout }}"
      poll: 15
      ignore_errors: true
      when: not (skip_aiperf | bool)

    - name: Load Langfuse credentials if present
      ansible.builtin.slurp:
        src: /opt/langfuse/docker-compose.yml
      register: lf_compose_probe
      ignore_errors: true
      changed_when: false

    - name: Read local Langfuse credentials file if present
      ansible.builtin.set_fact:
        lf_creds_text: "{{ lookup('file', playbook_dir ~ '/../../langfuse/credentials.env', errors='ignore') | default('', true) }}"
      delegate_to: localhost
      run_once: true

    - name: Parse Langfuse keys from credentials file
      ansible.builtin.set_fact:
        lf_public_key: "{{ (lf_creds_text | regex_search('LANGFUSE_PUBLIC_KEY=(.+)', '\\1') | default([''], true))[0] | default('', true) }}"
        lf_secret_key: "{{ (lf_creds_text | regex_search('LANGFUSE_SECRET_KEY=(.+)', '\\1') | default([''], true))[0] | default('', true) }}"
      run_once: true

    # Pair semantics: one sweep_stamp covers a baseline+mesh pair. The skill
    # passes `-e sweep_stamp=...` to both ansible invocations so they write
    # into the same dir. If no -e override, fall back to CPU's current UTC
    # (useful for ad-hoc single-scenario runs).
    - name: Record sweep timestamps on CPU host (fallback when sweep_stamp not provided)
      ansible.builtin.shell: |
        echo "iso=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
        echo "stamp=$(date -u +%Y%m%d-%H%M)"
      register: sweep_stamp_probe
      changed_when: false

    - name: Expose sweep timestamps as facts
      ansible.builtin.set_fact:
        sweep_start_ts: "{{ (sweep_stamp_probe.stdout_lines | select('match', '^iso=')   | first).split('=',1)[1] }}"
        sweep_stamp: "{{ sweep_stamp | default((sweep_stamp_probe.stdout_lines | select('match', '^stamp=') | first).split('=',1)[1], true) }}"

    - name: Run sweep script ({{ sweep_type }})
      shell: |
        set -o pipefail
        source ~/venv-aip-intern/bin/activate
        cd ~/aip-intern-project
        export OPENAI_BASE_URL="http://{{ gpu_private_ip }}:8000/v1"
        export OPENAI_API_KEY="not-needed-for-vllm"
        export OPENAI_MODEL="{{ scenarios[scenario].model }}"
        export AIP_SWEEP_STAMP="{{ sweep_stamp }}"
        {% if lf_public_key | length > 0 and lf_secret_key | length > 0 %}
        export LANGFUSE_HOST="http://127.0.0.1:3000"
        export LANGFUSE_HOST_PUBLIC="http://{{ hostvars[groups['cpu'][0]].inventory_hostname }}:3000"
        export LANGFUSE_PUBLIC_KEY="{{ lf_public_key }}"
        export LANGFUSE_SECRET_KEY="{{ lf_secret_key }}"
        {% endif %}
        python scripts/run_{{ sweep_type }}.py --config config/{{ sweep_type }}.yaml 2>&1 | tee ~/sweep_{{ sweep_type }}.log
      args:
        executable: /bin/bash
      when: sweep_type is defined
      async: 14400   # 4h ceiling for a 20-run sweep
      poll: 30
      register: sweep_result
      ignore_errors: true

    - name: Export Langfuse traces from sweep window to NDJSON
      shell: |
        set -o pipefail
        python3 - <<'PYEOF'
        import base64, json, os, sys, urllib.parse, urllib.request

        host   = "http://127.0.0.1:3000"
        pk     = os.environ["LF_PK"]
        sk     = os.environ["LF_SK"]
        since  = os.environ["LF_FROM"]
        outp   = os.environ["LF_OUT"]

        auth = base64.b64encode(f"{pk}:{sk}".encode()).decode()
        headers = {"Authorization": f"Basic {auth}", "Accept": "application/json"}

        def http_get(path, params=None):
            url = host + path
            if params:
                url += "?" + urllib.parse.urlencode(params)
            req = urllib.request.Request(url, headers=headers)
            with urllib.request.urlopen(req, timeout=60) as r:
                return json.loads(r.read())

        # 1) List traces since sweep start (paginated)
        trace_ids = []
        page = 1
        while True:
            data = http_get("/api/public/traces", {
                "fromTimestamp": since,
                "page": page,
                "limit": 50,
                "orderBy": "timestamp.asc",
            })
            items = data.get("data", [])
            if not items:
                break
            trace_ids.extend([t["id"] for t in items])
            meta = data.get("meta", {})
            total_pages = meta.get("totalPages", page)
            if page >= total_pages:
                break
            page += 1

        # 2) Fetch each trace fully resolved (includes observations) and dump NDJSON
        n_ok = n_err = 0
        with open(outp, "w") as f:
            for tid in trace_ids:
                try:
                    full = http_get(f"/api/public/traces/{urllib.parse.quote(tid)}")
                    f.write(json.dumps(full, separators=(",", ":")) + "\n")
                    n_ok += 1
                except Exception as e:
                    sys.stderr.write(f"trace {tid} fetch failed: {e}\n")
                    n_err += 1
        print(f"Exported {n_ok} traces ({n_err} errors) -> {outp}")
        PYEOF
      args:
        executable: /bin/bash
      environment:
        LF_PK: "{{ lf_public_key }}"
        LF_SK: "{{ lf_secret_key }}"
        LF_FROM: "{{ sweep_start_ts }}"
        LF_OUT: "/home/ubuntu/aip-intern-project/artifacts/sweeps/{{ sweep_stamp }}/langfuse_{{ sweep_type }}.ndjson"
      # Langfuse runs on the CPU host (see setup_langfuse.yml), so we execute
      # the export locally on CPU — no delegation. Delegating to GPU would hit
      # 127.0.0.1:3000 on a host where Langfuse isn't running.
      when:
        - sweep_type is defined
        - lf_public_key | length > 0
        - lf_secret_key | length > 0
      register: lf_export_result
      ignore_errors: true

    - name: Show Langfuse export result
      debug:
        msg: "{{ lf_export_result.stdout | default('(skipped — no Langfuse creds)') }}"
      when: lf_export_result is defined

    - name: Show sweep tail
      debug:
        var: sweep_result.stdout_lines[-30:]
      when: sweep_type is defined and sweep_result.stdout_lines is defined

    - name: Run NeMo Eval (MMLU)
      shell: |
        source ~/venv-nemo-eval/bin/activate
        nemo-evaluator-launcher run \
          --config ~/.nemo-eval-configs/local_basic.yaml \
          -o "target.api_endpoint.url=http://{{ gpu_private_ip }}:8000/v1/completions" \
          -o "++target.api_endpoint.model_id={{ scenarios[scenario].model }}" \
          -o "~evaluation.tasks=null" \
          -o "++evaluation.tasks=[{name: lm-evaluation-harness.mmlu}]" \
          -o "execution.output_dir=/home/ubuntu/results/{{ scenario }}"
      environment:
        NGC_API_KEY: "dummy"
      args:
        executable: /bin/bash
      when: not (skip_nemo_eval | bool)
      async: "{{ nemo_eval_timeout }}"
      poll: 30
      ignore_errors: true

- name: Sync Langfuse trace export from CPU to local machine
  hosts: cpu
  gather_facts: false
  tasks:
    - name: Write rsync SSH wrapper script (cpu host leg)
      ansible.builtin.copy:
        content: |
          #!/bin/sh
          exec ssh -i "{{ playbook_dir }}/../../ssh/aip-intern-generated-key.pem" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$@"
        dest: /tmp/aip_intern_rsync_ssh.sh
        mode: '0755'
      delegate_to: localhost
      run_once: true

    # Langfuse NDJSON now lives under the sweep's pair dir, so it's pulled
    # together with the run metrics by the "Sync this sweep's artifact dir"
    # step further down. No separate rsync needed.

- name: Stop vLLM for {{ scenario }}
  hosts: gpu
  become: true
  tasks:
    - name: Stop vLLM service
      ansible.builtin.systemd_service:
        name: vllm
        state: stopped
      ignore_errors: true

    - name: Wait for port 8000 to close (GPU memory freed)
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 8000
        state: stopped
        timeout: 180
        delay: 10

- name: Collect artifacts for {{ scenario }}
  hosts: cpu
  tasks:
    - name: Write rsync SSH wrapper script
      ansible.builtin.copy:
        content: |
          #!/bin/sh
          exec ssh -i "{{ playbook_dir }}/../../ssh/aip-intern-generated-key.pem" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$@"
        dest: /tmp/aip_intern_rsync_ssh.sh
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: Sync AIPerf artifacts to local machine
      ansible.posix.synchronize:
        src: "~/artifacts/aip-intern/"
        dest: "{{ playbook_dir }}/../../../artifacts/aip-intern/"
        mode: pull
        rsync_opts:
          - "--rsh=/tmp/aip_intern_rsync_ssh.sh"
      delegate_to: localhost
      when: not (skip_aiperf | bool)

    - name: Sync NeMo eval results to local machine
      ansible.posix.synchronize:
        src: "~/results/"
        dest: "{{ playbook_dir }}/../../../artifacts/nemo/"
        mode: pull
        rsync_opts:
          - "--rsh=/tmp/aip_intern_rsync_ssh.sh"
      delegate_to: localhost
      when: not (skip_nemo_eval | bool)

    - name: Ensure local sweep parent dir exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../../../artifacts/sweeps/{{ hostvars[groups['cpu'][0]].sweep_stamp }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      when: hostvars[groups['cpu'][0]].sweep_stamp is defined

    # Pull this scenario's runs (and the langfuse export we wrote beside them)
    # from the pair dir. Layout both sides:
    # artifacts/sweeps/{sweep_stamp}/{scenario}/{run_id}/ + langfuse_{scenario}.ndjson
    - name: Sync this scenario's runs under the pair dir
      ansible.posix.synchronize:
        src: "/home/ubuntu/aip-intern-project/artifacts/sweeps/{{ hostvars[groups['cpu'][0]].sweep_stamp }}/{{ scenario }}/"
        dest: "{{ playbook_dir }}/../../../artifacts/sweeps/{{ hostvars[groups['cpu'][0]].sweep_stamp }}/{{ scenario }}/"
        mode: pull
        rsync_opts:
          - "--rsh=/tmp/aip_intern_rsync_ssh.sh"
      delegate_to: localhost
      when: hostvars[groups['cpu'][0]].sweep_stamp is defined

    - name: Sync Langfuse NDJSON export (co-located with runs)
      ansible.posix.synchronize:
        src: "/home/ubuntu/aip-intern-project/artifacts/sweeps/{{ hostvars[groups['cpu'][0]].sweep_stamp }}/langfuse_{{ sweep_type }}.ndjson"
        dest: "{{ playbook_dir }}/../../../artifacts/sweeps/{{ hostvars[groups['cpu'][0]].sweep_stamp }}/langfuse_{{ sweep_type }}.ndjson"
        mode: pull
        rsync_opts:
          - "--rsh=/tmp/aip_intern_rsync_ssh.sh"
      delegate_to: localhost
      when:
        - hostvars[groups['cpu'][0]].sweep_stamp is defined
        - lf_public_key | default('') | length > 0
      ignore_errors: true

    - name: Sync sweep log to local machine
      ansible.posix.synchronize:
        src: "/home/ubuntu/sweep_{{ sweep_type }}.log"
        dest: "{{ playbook_dir }}/../../../artifacts/sweep_{{ sweep_type }}.log"
        mode: pull
        rsync_opts:
          - "--rsh=/tmp/aip_intern_rsync_ssh.sh"
      delegate_to: localhost
      when: sweep_type is defined
      ignore_errors: true

