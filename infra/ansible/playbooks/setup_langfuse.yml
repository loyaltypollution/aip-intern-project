---
# Deploy Langfuse v2 on the CPU box via docker-compose.
# Prereqs: setup_cpu.yml has already installed docker + docker-compose-plugin.
#
# Secrets are generated once by ansible's `password` lookup into
# infra/langfuse/secrets/ on the control node (gitignored) and reused
# across runs, so keys stay stable between re-deploys.
#
# Seeds a project via LANGFUSE_INIT_* on first boot so the sweep knows
# the keys without a UI round-trip.
#
# Usage:  ansible-playbook playbooks/setup_langfuse.yml

- name: Deploy Langfuse on CPU box
  hosts: cpu
  become: true
  gather_facts: false

  vars:
    lf_secrets_dir: "{{ playbook_dir }}/../../langfuse/secrets"
    lf_creds_file: "{{ playbook_dir }}/../../langfuse/credentials.env"
    lf_user_email: "admin@aip-intern.local"
    cpu_public_ip: "{{ hostvars[inventory_hostname].ansible_host | default(inventory_hostname) }}"

    # `password` lookup: generates on first use, reads on subsequent runs.
    lf_db_password:          "{{ lookup('password', lf_secrets_dir ~ '/db_password chars=ascii_letters,digits length=32') }}"
    lf_clickhouse_password:  "{{ lookup('password', lf_secrets_dir ~ '/clickhouse_password chars=ascii_letters,digits length=32') }}"
    lf_redis_password:       "{{ lookup('password', lf_secrets_dir ~ '/redis_password chars=ascii_letters,digits length=32') }}"
    lf_minio_password:       "{{ lookup('password', lf_secrets_dir ~ '/minio_password chars=ascii_letters,digits length=32') }}"
    lf_nextauth_secret:      "{{ lookup('password', lf_secrets_dir ~ '/nextauth_secret chars=ascii_letters,digits length=48') }}"
    lf_salt:                 "{{ lookup('password', lf_secrets_dir ~ '/salt chars=ascii_letters,digits length=32') }}"
    lf_encryption_key:       "{{ lookup('password', lf_secrets_dir ~ '/encryption_key chars=hexdigits length=64') | lower }}"
    lf_public_key:           "pk-lf-{{ lookup('password', lf_secrets_dir ~ '/public_key chars=hexdigits length=32') | lower }}"
    lf_secret_key:           "sk-lf-{{ lookup('password', lf_secrets_dir ~ '/secret_key chars=hexdigits length=32') | lower }}"
    lf_user_password:        "{{ lookup('password', lf_secrets_dir ~ '/user_password chars=ascii_letters,digits length=24') }}"

  tasks:
    - name: Ensure local secrets dir exists
      ansible.builtin.file:
        path: "{{ lf_secrets_dir }}"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false
      run_once: true

    - name: Create /opt/langfuse
      ansible.builtin.file:
        path: /opt/langfuse
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0750"

    - name: Render docker-compose.yml
      ansible.builtin.template:
        src: ../templates/langfuse-compose.yml.j2
        dest: /opt/langfuse/docker-compose.yml
        owner: ubuntu
        group: ubuntu
        mode: "0640"
      register: compose_render

    - name: docker compose up -d
      ansible.builtin.command:
        cmd: docker compose -f /opt/langfuse/docker-compose.yml up -d
      changed_when: true

    - name: Wait for Langfuse API (up to 10 min — first boot runs Clickhouse migrations)
      ansible.builtin.uri:
        url: "http://127.0.0.1:3000/api/public/health"
        status_code: 200
      register: lf_health
      retries: 120
      delay: 5
      until: lf_health.status == 200

    - name: Write credentials file on control node (gitignored)
      ansible.builtin.copy:
        dest: "{{ lf_creds_file }}"
        mode: "0600"
        content: |
          # Generated by setup_langfuse.yml — do not commit.
          # LANGFUSE_HOST for sweep jobs running on the CPU host itself.
          LANGFUSE_HOST=http://127.0.0.1:3000
          # Public URL for browser access to the UI from your laptop.
          LANGFUSE_HOST_PUBLIC=http://{{ cpu_public_ip }}:3000
          LANGFUSE_PUBLIC_KEY={{ lf_public_key }}
          LANGFUSE_SECRET_KEY={{ lf_secret_key }}
          LANGFUSE_UI_USER={{ lf_user_email }}
          LANGFUSE_UI_PASSWORD={{ lf_user_password }}
      delegate_to: localhost
      become: false
      run_once: true

    - name: Show Langfuse UI URL
      ansible.builtin.debug:
        msg: |
          Langfuse ready.
          UI:    http://{{ cpu_public_ip }}:3000
          Login: {{ lf_user_email }} / (see infra/langfuse/credentials.env)
          Keys:  infra/langfuse/credentials.env (gitignored)
