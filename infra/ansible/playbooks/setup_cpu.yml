---
- name: Set up CPU instance (AIPerf + NeMo Eval)
  hosts: cpu
  become: true
  gather_facts: true

  vars:
    aiperf_repo_url: "https://github.com/ai-dynamo/aiperf"

  tasks:
    # Fresh Ubuntu AMIs run unattended-upgrades on first boot, which holds the
    # dpkg lock for several minutes. `systemctl stop` is async and doesn't kill
    # the in-flight apt-get child, so we kill the process tree directly and
    # then wait for every apt lock file to be free before proceeding.
    - name: Kill unattended-upgrades and wait for apt locks
      ansible.builtin.shell: |
        set -eu
        systemctl stop unattended-upgrades.service 2>/dev/null || true
        systemctl mask unattended-upgrades.service 2>/dev/null || true
        pkill -9 -f unattended-upgr 2>/dev/null || true
        for lock in /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/lib/apt/lists/lock /var/cache/apt/archives/lock; do
          for _ in $(seq 1 120); do
            fuser "$lock" >/dev/null 2>&1 || break
            sleep 5
          done
        done
      changed_when: false
      args:
        executable: /bin/bash

    - name: Install system packages
      apt:
        name:
          - python3-venv
          - git
          - rsync
          - software-properties-common
          - curl
        state: present
        update_cache: true

    - name: Add NodeSource repo (Node.js 22 LTS)
      shell: curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      args:
        executable: /bin/bash
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Add deadsnakes PPA (provides python3.11 on Ubuntu 22.04)
      ansible.builtin.apt_repository:
        repo: "ppa:deadsnakes/ppa"
        state: present
        update_cache: true

    - name: Install python3.11 + venv
      apt:
        name:
          - python3.11
          - python3.11-venv
          - python3.11-dev
        state: present

    # --- Docker (required by nemo-evaluator-launcher) ---
    - name: Install Docker prerequisite packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: Install Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start Docker service
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: true

    - name: Pre-pull NeMo evaluator Docker image
      shell: docker pull nvcr.io/nvidia/eval-factory/lm-evaluation-harness:26.01
      args:
        executable: /bin/bash

    # --- AIPerf ---
    - name: Clone AIPerf repo
      become: false
      git:
        repo: "{{ aiperf_repo_url }}"
        dest: ~/aiperf
        update: true

    - name: Create AIPerf venv
      become: false
      command: python3 -m venv ~/aiperf/.venv
      args:
        creates: ~/aiperf/.venv/bin/activate

    - name: Install AIPerf (editable)
      become: false
      pip:
        name: "."
        chdir: ~/aiperf
        virtualenv: ~/aiperf/.venv
        editable: true
        state: present

    # --- NeMo Evaluator ---
    - name: Create venv-nemo-eval
      become: false
      command: python3 -m venv ~/venv-nemo-eval
      args:
        creates: ~/venv-nemo-eval/bin/activate

    - name: Install nemo-evaluator-launcher
      become: false
      pip:
        name:
          - pip
          - nemo-evaluator-launcher
        virtualenv: ~/venv-nemo-eval
        state: latest

    - name: Create nemo-eval config directory
      become: false
      file:
        path: ~/.nemo-eval-configs
        state: directory
        mode: "0755"

    - name: Find bundled local_basic.yaml
      become: false
      find:
        paths: ~/venv-nemo-eval/lib
        patterns: local_basic.yaml
        recurse: true
      register: bundled_config

    - name: Copy bundled config (if found)
      become: false
      copy:
        src: "{{ bundled_config.files[0].path }}"
        dest: ~/.nemo-eval-configs/local_basic.yaml
        remote_src: true
      when: bundled_config.files | length > 0

    - name: Fetch config from GitHub (fallback)
      become: false
      get_url:
        url: "https://raw.githubusercontent.com/NVIDIA-NeMo/Evaluator/main/packages/nemo-evaluator-launcher/examples/local_basic.yaml"
        dest: ~/.nemo-eval-configs/local_basic.yaml
        force: false
      when: bundled_config.files | length == 0

    - name: Verify nemo-evaluator-launcher
      become: false
      command: ~/venv-nemo-eval/bin/nemo-evaluator-launcher --version
      register: nemo_version
      changed_when: false

    - name: Show NeMo Evaluator version
      debug:
        msg: "nemo-evaluator-launcher {{ nemo_version.stdout }}"

    # --- aip-intern-project ---
    - name: Write rsync SSH wrapper (push)
      ansible.builtin.copy:
        content: |
          #!/bin/sh
          exec ssh -i "{{ playbook_dir }}/../../ssh/aip-intern-generated-key.pem" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$@"
        dest: /tmp/aip_intern_push_ssh.sh
        mode: '0755'
      delegate_to: localhost
      become: false
      run_once: true

    - name: Sync local repo to CPU box
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../../../"
        dest: "/home/ubuntu/aip-intern-project/"
        delete: false
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=artifacts/"
          - "--exclude=.venv"
          - "--exclude=__pycache__"
          - "--exclude=.mypy_cache"
          - "--exclude=.pytest_cache"
          - "--exclude=node_modules"
          - "--exclude=.DS_Store"
          - "--rsh=/tmp/aip_intern_push_ssh.sh"
      delegate_to: localhost
      become: false

    - name: Create venv-aip-intern
      become: false
      command: python3.11 -m venv ~/venv-aip-intern
      args:
        creates: ~/venv-aip-intern/bin/activate

    - name: Install aip-intern-project (editable)
      become: false
      pip:
        name: ".[dev]"
        chdir: /home/ubuntu/aip-intern-project
        virtualenv: ~/venv-aip-intern
        editable: true
        state: present

    - name: Install extra CPU packages
      become: false
      pip:
        name: "{{ item }}"
        virtualenv: ~/venv-aip-intern
        state: present
      loop: "{{ extra_cpu_packages }}"
