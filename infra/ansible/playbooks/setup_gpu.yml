---
- name: Set up GPU instance (vLLM)
  hosts: gpu
  become: true
  gather_facts: false

  tasks:
    # Fresh Ubuntu AMIs run unattended-upgrades on first boot, which holds the
    # dpkg lock for several minutes. `systemctl stop` is async and doesn't kill
    # the in-flight apt-get child, so we kill the process tree directly and
    # then wait for every apt lock file to be free before proceeding.
    - name: Kill unattended-upgrades and wait for apt locks
      ansible.builtin.shell: |
        set -eu
        systemctl stop unattended-upgrades.service 2>/dev/null || true
        systemctl kill -s KILL unattended-upgrades.service 2>/dev/null || true
        systemctl mask unattended-upgrades.service 2>/dev/null || true
        for lock in /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/lib/apt/lists/lock /var/cache/apt/archives/lock; do
          for _ in $(seq 1 120); do
            fuser "$lock" >/dev/null 2>&1 || break
            sleep 5
          done
        done
      changed_when: false
      args:
        executable: /bin/bash

    - name: Install system packages
      apt:
        name:
          - python3-venv
          - git
          - nvidia-cuda-toolkit
        state: present
        update_cache: true

    - name: Create venv-vllm
      become: false
      command: python3 -m venv ~/venv-vllm
      args:
        creates: ~/venv-vllm/bin/activate

    - name: Install vLLM and dependencies
      become: false
      pip:
        name:
          - "vllm==0.12.0"
          - "transformers>=4.45"
          - "accelerate"
        virtualenv: ~/venv-vllm
        state: present

    - name: Verify vLLM install
      become: false
      command: ~/venv-vllm/bin/python3 -c "import vllm; print(vllm.__version__)"
      register: vllm_version
      changed_when: false

    - name: Show vLLM version
      debug:
        msg: "vLLM {{ vllm_version.stdout }}"
